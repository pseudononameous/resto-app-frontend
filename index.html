<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Resto App - Restaurant management" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Onest:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;1,400;1,500&display=swap"
    rel="stylesheet" />
  <script>
    (function () {
      var key = 'resto-app-color-scheme';
      var stored = localStorage.getItem(key);
      var scheme = stored === 'dark' || stored === 'light' ? stored : 'light';
      document.documentElement.setAttribute('data-mantine-color-scheme', scheme);
    })();
  </script>
  <title>Resto App</title>
</head>

<body style="margin: 0; min-height: 100vh;">
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
