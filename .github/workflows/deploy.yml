name: Deploy via Komodo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Komodo Webhook
        run: |
          payload='{"ref":"refs/heads/main"}'
          signature=$(echo -n "$payload" | openssl dgst -sha256 -hmac "${{ secrets.KOMODO_SECRET }}" | sed 's/^.* //')
          curl -X POST https://server.developedbychris.work/listener/github/procedure/69a5cc8b49484021d50da901/main \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: push" \
            -H "X-Hub-Signature-256: sha256=$signature" \
            -d "$payload"
