services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_HOST: ${VITE_API_HOST:-http://localhost:8001/api}
        VITE_API_DOMAIN: ${VITE_API_DOMAIN:-http://localhost:8001}
        VITE_APP_NAME: ${VITE_APP_NAME:-RESTO APP}
    container_name: resto-frontend
    ports:
      - "${FRONTEND_PORT:-3001}:3001"
    restart: unless-stopped
